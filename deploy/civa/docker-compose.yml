# CIVA platform stack — always-on, lightweight. The single launcher origin (web/gateway) fronts
# the SPA, shared auth, and the orchestrator; the game's lobby is started on demand (deploy/civa-game).
# Deployed alongside the existing Leaders without touching it.
#
#   docker network create civa-net      # once
#   cd deploy/civa && cp .env.example .env && set JWT_SECRET
#   bash build-images.sh && docker compose up -d
name: civa

networks:
  civa-net:
    external: true

services:
  auth:
    image: civa-service:latest
    build:
      context: ../..
      dockerfile: Dockerfile
      target: service
    command: ['pnpm', '--filter', '@civa/auth', 'start']
    environment:
      AUTH_PORT: '8081'
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in deploy/civa/.env}
      JWT_ISSUER: civa
      NODE_ENV: production
    networks:
      - civa-net
    restart: unless-stopped

  orchestrator:
    image: civa-orchestrator:latest
    build:
      context: ../..
      dockerfile: Dockerfile
      target: orchestrator
    environment:
      ORCHESTRATOR_PORT: '8090'
      CIVA_GAME_DIR: /root/civa/deploy/civa-game
      CIVA_GAME_PROJECT: civa-game
      CIVA_ACTIVITY_URL: http://lobby:8082/metrics
      CIVA_IDLE_MS: '600000' # stop CIVA after 10 min with zero players
      REAPER_MS: '30000'
      NODE_ENV: production
    volumes:
      # Control the host Docker (start/stop the game compose). Mount the repo at the SAME path so
      # the compose file path is valid for the host daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/civa:/root/civa
    networks:
      - civa-net
    restart: unless-stopped

  web:
    image: civa-web:latest
    build:
      context: ../..
      dockerfile: Dockerfile
      target: web
    ports:
      - '8088:8088'
    networks:
      - civa-net
    depends_on:
      - auth
      - orchestrator
    restart: unless-stopped
